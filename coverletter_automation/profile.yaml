# --- About / Profil ----------------------------------------------------------
about:
  de: >
    Systems & Software Engineer mit Expertise in sicherheitskritischen
    Automotive-Systemen, Softwarequalität und Softwareentwicklungsprozessen.
    Umfassende Erfahrung über den gesamten System- und Software-Lebenszyklus
    hinweg: Vom Anforderungsmanagement und der System-/Softwarearchitektur bis
    zu Implementierung, Verifikation und Freigabe nach ISO 26262 und ASPICE.
    Fokus auf die kontinuierliche Verbesserung von Entwicklungsprozessen,
    speziell durch den Einsatz von KI-gestützten Methoden und Werkzeugen. In
    Verbindung mit meinem sicherheitskritischen Hintergrund untersuche ich, wie
    KI-generierte Software verlässlich und weitgehend fehlerfrei werden kann —
    etwa durch Verifikation, Traceability und Human-in-the-Loop-Review.
  en: >
    Systems & Software Engineer with expertise in safety-critical automotive
    systems, software quality and software development processes. Broad
    experience across the full system and software lifecycle, from requirements
    management and system/software architecture to implementation, verification
    and release in line with ISO 26262 and ASPICE. Strong focus on the
    continuous improvement of development processes, especially through
    AI-supported methods and tools. Bringing this together with my
    safety-critical background, I explore how AI-generated software can be made
    dependable and largely error-free through verification, traceability and
    human-in-the-loop review.

