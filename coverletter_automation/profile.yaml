    de: { title: "Kontinuierliches Lernen", desc: "Methoden, Tools und Workflows kontinuierlich verbessern und bewusst an Fehlern wachsen, statt sie zu verbergen." }
    en: { title: "Continuous learning", desc: "Continuously improving methods, tools and workflows, and deliberately growing from mistakes rather than hiding them." }
  - key: empathy
    icon: "faHandsHelping"
    de: { title: "Menschlich und empathisch", desc: "Menschlich und empathisch — besonders in schwierigen Situationen; ruhig, respektvoll und lösungsorientiert im Umgang mit anderen." }
    en: { title: "Human and empathetic", desc: "Human and empathetic, especially in difficult situations; calm, respectful and solution-oriented in working with others." }
