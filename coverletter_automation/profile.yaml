    icon: "faSitemap"
    de: { title: "Komplexität herunterbrechen", desc: "Komplexe Probleme in überschaubare, strukturierte Arbeitspakete mit klaren Schnittstellen, Prioritäten und Validierungspfaden überführen." }
    en: { title: "Breaking down complexity", desc: "Turning complex problems into manageable, structured work packages with clear interfaces, priorities and validation paths." }
  - key: big_picture
    icon: "faProjectDiagram"
    de: { title: "Das große Ganze sehen", desc: "Anforderungen, Systemverhalten, Implementierung, Prozesse und Stakeholder-Bedürfnisse zusammen denken, statt nur ein lokales Detail zu optimieren." }
    en: { title: "Seeing the bigger picture", desc: "Connecting requirements, system behavior, implementation, process and stakeholder needs instead of optimizing only one local detail." }
  - key: communication
    icon: "faComments"
    de: { title: "Klare Kommunikation", desc: "Technische Themen verständlich machen, Schnittstellen früh abstimmen und gemeinsame Klarheit über Engineering, Qualität und Management hinweg schaffen." }
