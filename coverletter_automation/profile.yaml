  - key: quality
    icon: "faCheckDouble"
    de: { title: "Qualitätsfokus", desc: "Zuverlässigkeit durch Traceability, Review-Disziplin, robuste Entscheidungen und ein starkes Verifikationsverständnis absichern." }
